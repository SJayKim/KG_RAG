services:
  neo4j:
    image: neo4j:5.26-community
    container_name: polypharmgraph-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      # Zero-key default for local dev. Override in prod.
      NEO4J_AUTH: neo4j/testpassword
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  neo4j_data:
